<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Oreplates Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: #f0f2f5; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 1.5rem;
        }
        .reset-card {
            background: white;
            width: 400px;
            max-width: 100%;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            text-align: center;
        }
        .reset-card h1 {
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #4a5568;
        }
        .form-control {
            width: 100%;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #f8fafc;
        }
        .btn-reset {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 1.2rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-reset:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        #reset-state {
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
            padding: 0.8rem;
            border-radius: 8px;
        }
        .error-state {
            background: #fee2e2;
            color: #ef4444;
        }
        .success-state {
            background: #dcfce7;
            color: #166534;
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <div class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
            <img src="../assets/images/logo.svg" alt="Logo" style="height: 45px;">
        </div>
        <h1>New Password</h1>
        <p style="color: #718096; margin-bottom: 2rem;">Secure your account with a new password.</p>
        
        <div id="reset-state"></div>
        
        <form id="updatePasswordForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new-password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required minlength="6">
            </div>
            <button type="submit" class="btn-reset" id="updateBtn">Update Password <i class="fas fa-check-circle"></i></button>
        </form>
        
        <div id="login-link" style="display: none; margin-top: 1.5rem;">
            <a href="login.html" style="color: var(--primary); font-weight: 700; text-decoration: none;">Go to Login <i class="fas fa-arrow-right"></i></a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script>
        const updateForm = document.getElementById('updatePasswordForm');
        const updateBtn = document.getElementById('updateBtn');
        const stateMsg = document.getElementById('reset-state');
        const loginLink = document.getElementById('login-link');

        updateForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                stateMsg.innerText = "Passwords do not match.";
                stateMsg.className = "error-state";
                stateMsg.style.display = "block";
                return;
            }

            updateBtn.disabled = true;
            updateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
            stateMsg.style.display = "none";

            try {
                const { error } = await window.supabaseInstance.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;

                stateMsg.innerText = "Password updated successfully!";
                stateMsg.className = "success-state";
                stateMsg.style.display = "block";
                updateForm.style.display = "none";
                loginLink.style.display = "block";
                
                // Also clear session
                await window.supabaseInstance.auth.signOut();
            } catch (err) {
                console.error('Update error:', err);
                stateMsg.innerText = err.message || "Failed to update password. Link might be expired.";
                stateMsg.className = "error-state";
                stateMsg.style.display = "block";
                updateBtn.disabled = false;
                updateBtn.innerHTML = 'Update Password <i class="fas fa-check-circle"></i>';
            }
        });

        // Ensure we handle hash flow properly if redirect didn't auto-handle session
        window.addEventListener('load', async () => {
            const { data } = await window.supabaseInstance.auth.getSession();
            if (!data.session) {
                // If no session, the link might be old or the user navigated directly
                stateMsg.innerText = "Invalid or expired reset link. Please request a new one from the login page.";
                stateMsg.className = "error-state";
                stateMsg.style.display = "block";
                updateForm.style.display = "none";
                loginLink.style.display = "block";
            }
        });
    </script>
</body>
</html>
