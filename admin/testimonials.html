<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Testimonials - Oreplates Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: flex; background: #f0f2f5; }
        .sidebar { width: 260px; height: 100vh; background: var(--primary-dark); color: white; position: fixed; padding: 2rem 1rem; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 2rem; }
        .nav-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; transition: var(--transition); }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); }
        .table-container { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: var(--shadow); }
        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo" style="margin-bottom: 2.5rem; color: white;">
            <img src="../assets/images/logo.svg" alt="Logo" style="filter: brightness(0) invert(1); height: 35px;">
            <span>Oreplates Admin</span>
        </div>
        <a href="index.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html" class="nav-item"><i class="fas fa-box"></i> Products</a>
        <a href="orders.html" class="nav-item"><i class="fas fa-shopping-cart"></i> Orders</a>
        <a href="billing.html" class="nav-item"><i class="fas fa-file-invoice-dollar"></i> Offline Billing</a>
        <a href="bulk-enquiries.html" class="nav-item"><i class="fas fa-bulk-arrow-up"></i> Bulk Enquiries</a>
        <a href="messages.html" class="nav-item"><i class="fas fa-envelope"></i> Contact Messages</a>
        <a href="gallery.html" class="nav-item"><i class="fas fa-images"></i> Gallery</a>
        <a href="testimonials.html" class="nav-item active"><i class="fas fa-comment-dots"></i> Testimonials</a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i> Company Settings</a>
    </div>

    <div class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Testimonials</h1>
            <button class="btn btn-primary"><i class="fas fa-plus"></i> Add Testimonial</button>
        </header>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Review</th>
                        <th>Rating</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Ravi Kumar</strong></td>
                        <td style="max-width: 400px;">"Very strong and eco-friendly plates. Perfect for events."</td>
                        <td style="color: #fbbf24;"><i class="fas fa-star"></i> 5.0</td>
                        <td>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn btn-outline btn-sm"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm" style="background: #fee2e2; color: #991b1b;"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
