<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Oreplates</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: #f0f2f5; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 1.5rem;
        }
        .login-card {
            background: white;
            width: 400px;
            max-width: 100%;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-card h1 {
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #4a5568;
        }
        .form-control {
            width: 100%;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #f8fafc;
        }
        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 1.2rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        #login-error, #reset-error, #reset-success {
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
            padding: 0.8rem;
            border-radius: 8px;
        }
        #login-error, #reset-error {
            background: #fee2e2;
            color: #ef4444;
        }
        #reset-success {
            background: #dcfce7;
            color: #166534;
        }
        .auth-toggle {
            display: block;
            margin-top: 1rem;
            color: var(--primary);
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .back-link {
            display: block;
            margin-top: 1.5rem;
            color: #4a5568;
            font-size: 0.85rem;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
            <img src="../assets/images/logo.svg" alt="Logo" style="height: 45px;">
        </div>

        <!-- Login Section -->
        <div id="login-section">
            <h1>Admin Control</h1>
            <p style="color: #718096; margin-bottom: 2rem;">Please sign in to manage your website.</p>
            
            <div id="login-error">Invalid credentials. Please try again.</div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@oreplates.com" required>
                </div>
                <div class="form-group" style="margin-bottom: 0.5rem;">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div style="text-align: right; margin-bottom: 1.5rem;">
                    <span class="auth-toggle" onclick="toggleAuth('reset')">Forgot Password?</span>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">Sign In <i class="fas fa-arrow-right"></i></button>
            </form>
        </div>

        <!-- Forgot Password Section -->
        <div id="reset-section" style="display: none;">
            <h1>Reset Password</h1>
            <p style="color: #718096; margin-bottom: 2rem;">Enter your email to receive a reset link.</p>
            
            <div id="reset-error">Could not send reset link. Try again.</div>
            <div id="reset-success">Reset link sent! Please check your email inbox.</div>
            
            <form id="resetForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reset-email" class="form-control" placeholder="admin@oreplates.com" required>
                </div>
                <button type="submit" class="btn-login" id="resetBtn">Send Reset Link <i class="fas fa-paper-plane"></i></button>
                <span class="auth-toggle" onclick="toggleAuth('login')">Back to Login</span>
            </form>
        </div>
        
        <a href="../index.html" class="back-link"><i class="fas fa-chevron-left"></i> Back to Website</a>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script>
        const loginSection = document.getElementById('login-section');
        const resetSection = document.getElementById('reset-section');
        const loginForm = document.getElementById('loginForm');
        const resetForm = document.getElementById('resetForm');
        
        function toggleAuth(mode) {
            if (mode === 'reset') {
                loginSection.style.display = 'none';
                resetSection.style.display = 'block';
            } else {
                loginSection.style.display = 'block';
                resetSection.style.display = 'none';
            }
        }

        // Login Logic
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('login-error');
            
            errorMsg.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await window.supabaseInstance.auth.signInWithPassword({
                    email,
                    password,
                });

                if (error) throw error;

                if (data.session) {
                    sessionStorage.setItem('admin_token', data.session.access_token);
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error('Login error:', err);
                errorMsg.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
            }
        });

        // Forgot Password Logic
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const resetBtn = document.getElementById('resetBtn');
            const resetError = document.getElementById('reset-error');
            const resetSuccess = document.getElementById('reset-success');
            
            resetError.style.display = 'none';
            resetSuccess.style.display = 'none';
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending link...';

            const email = document.getElementById('reset-email').value;

            try {
                const { error } = await window.supabaseInstance.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/admin/reset-password.html',
                });

                if (error) throw error;

                resetSuccess.style.display = 'block';
                resetForm.reset();
            } catch (err) {
                console.error('Reset error:', err);
                resetError.style.display = 'block';
                resetError.innerText = err.message || 'Could not send reset link. Try again.';
            } finally {
                resetBtn.disabled = false;
                resetBtn.innerHTML = 'Send Reset Link <i class="fas fa-paper-plane"></i>';
            }
        });

        // Quick check if already logged in
        window.addEventListener('load', async () => {
            const { data } = await window.supabaseInstance.auth.getSession();
            if (data.session) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
